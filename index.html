<body>

<header class="site-header" id="site-header">
  <div class="header-inner">
    <a href="#hero" class="logo">鄭又勛 <span class="logo-en">York Cheng</span></a>
    <nav class="main-nav">
      <a href="#works" data-i18n-text="navWorks">作品</a>

      <a href="#contact" data-i18n-text="navContact">聯絡</a>

        <span class="lang-sep">/</span>
        <span class="lang-opt" data-lang="en">EN</span>
      </button>
    </nav>
  </div>
</header>

<main>

  <!-- HERO -->
  <section class="hero" id="hero">
    <div class="hero-bg-glow"></div>
    <div class="hero-inner">
      <p class="hero-eyebrow" data-i18n-text="heroEyebrow">DIRECTOR PORTFOLIO</p>
      <h1 class="hero-name">
        <span class="hero-name-zh" id="hero-name-zh">鄭又勛</span>
        <span class="hero-name-en" id="hero-name-en">York Cheng</span>
      </h1>
      <p class="hero-tagline" id="hero-tagline"></p>
      <div class="hero-video-wrap" id="hero-video-wrap"></div>
      <div class="hero-badge" id="hero-badge"></div>
    </div>
    <a href="#works" class="scroll-cue" aria-label="scroll down"><span></span></a>
  </section>

  <!-- WORKS -->
  <section class="works" id="works">
    <div class="section-head">
      <h2 data-i18n-text="worksTitle">精選作品</h2>
      <p class="section-sub" data-i18n-text="worksSub">從遊戲廣告到消費品牌，跨市場影像製作</p>
    </div>

    <div class="works-group" id="works-group-brand">
      <div class="works-group-head">
        <h3 data-i18n-text="worksBrandTitle">品牌廣告</h3>
        <span class="works-group-count" id="works-brand-count"></span>
      </div>
      <div class="works-grid" id="works-grid-brand"></div>
    </div>

    <div class="works-group" id="works-group-game">
      <div class="works-group-head">
        <h3 data-i18n-text="worksGameTitle">遊戲廣告</h3>
        <span class="works-group-count" id="works-game-count"></span>
      </div>
      <div class="works-grid" id="works-grid-game"></div>
    </div>
  </section>

  <!-- ABOUT -->
  <section class="about" id="about">
    <div class="about-inner">
      <div class="about-portrait">
        <img src="assets/portrait.jpg" alt="鄭又勛 York Cheng" width="932" height="1200" loading="lazy">
      </div>
      <div class="about-content">
        <p class="section-eyebrow" data-i18n-text="aboutEyebrow">ABOUT</p>
        <h2 data-i18n-text="aboutTitle">關於導演</h2>
        <p class="bio" id="about-bio"></p>

        <div class="stats-row" id="stats-row"></div>

        <div class="brands-block">
          <p class="block-label" data-i18n-text="brandsTitle">合作品牌</p>
          <div class="brand-group">
            <p class="brand-group-label" data-i18n-text="brandsConsumerTitle">消費／科技品牌</p>
            <div class="brand-chips" id="brand-chips-consumer"></div>
          </div>
          <div class="brand-group">
            <p class="brand-group-label" data-i18n-text="brandsGamesTitle">遊戲 IP</p>
            <div class="brand-chips" id="brand-chips-games"></div>
          </div>
        </div>

        <div class="talent-block" id="talent-block">
          <p class="block-label" data-i18n-text="talentTitle">合作藝人 Featured Talent</p>
          <div class="talent-wall" id="talent-wall"></div>
        </div>
      </div>
    </div>
  </section>

  <!-- CONTACT -->
  <section class="contact" id="contact">
    <div class="contact-inner">
      <p class="section-eyebrow" data-i18n-text="contactEyebrow">CONTACT</p>
      <h2 data-i18n-text="contactTitle">聯絡合作</h2>
      <p class="contact-company" id="contact-company"></p>
      <a class="contact-email" id="contact-email" href="#"></a>
